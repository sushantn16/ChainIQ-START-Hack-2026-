name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          zip -r deploy.zip backend/ data/ frontend/dist/ requirements.txt startup.sh -x "backend/__pycache__/*"

      - name: Deploy to Azure App Service
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" -X POST \
            -u "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://chainiq-app.scm.azurewebsites.net/api/zipdeploy?isAsync=false")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Deploy failed with HTTP $HTTP_STATUS"
            cat /tmp/deploy_response.txt
            exit 1
          fi
          echo "Deploy successful"
